name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          VITE_EVENTS_SHEET_CSV_URL: ${{ vars.VITE_EVENTS_SHEET_CSV_URL }}
          EVENTS_SHEET_CSV_URL: ${{ vars.EVENTS_SHEET_CSV_URL }}
          VITE_MEDIA_BASE: ${{ vars.VITE_MEDIA_BASE }}
        run: npm run build

      - name: Enable SPA deep links on Pages
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
